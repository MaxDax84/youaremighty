<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>You Are Mighty</title>
  <meta name="description" content="An epic personal declaration of greatness.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="You Are Mighty">
  <meta property="og:description" content="An epic personal declaration of greatness.">
  <meta property="og:image" content="https://images.pexels.com/photos/1431822/pexels-photo-1431822.jpeg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="You Are Mighty">
  <meta name="twitter:description" content="An epic personal declaration of greatness.">
  <meta name="twitter:image" content="https://images.pexels.com/photos/1431822/pexels-photo-1431822.jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:      #FFD700;
      --gold-mid:  #FFA500;
      --gold-deep: #FF8C00;
    }

    html, body {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0b0b1a 0%, #1a0a00 50%, #0b0b1a 100%);
      overflow: hidden;
      font-family: 'Cinzel Decorative', Georgia, serif;
    }

    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
      filter: brightness(0.32) saturate(1.3);
    }

    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
    }

    #canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    #flash {
      position: fixed; inset: 0; z-index: 8;
      pointer-events: none; background: var(--gold);
      opacity: 0; will-change: opacity;
    }

    /* ── Entry screen ─────────────────────────────────────── */
    #entry {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2.8rem;
      background: rgba(0,0,0,0.88);
      transition: opacity 0.7s ease;
    }

    #entry-title {
      font-size: clamp(2.2rem, 7vw, 5.5rem);
      font-weight: 900; color: var(--gold);
      text-align: center; padding: 0 1.5rem;
      letter-spacing: 0.14em;
      text-shadow:
        0 0 30px var(--gold), 0 0 70px var(--gold-mid),
        3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      animation: entryPulse 3.5s ease-in-out infinite;
    }

    @keyframes entryPulse {
      0%,100% { text-shadow: 0 0 25px var(--gold), 0 0 50px var(--gold-mid),  3px 3px 0 #000; }
      50%      { text-shadow: 0 0 50px var(--gold), 0 0 100px var(--gold-mid), 0 0 160px var(--gold-deep), 3px 3px 0 #000; }
    }

    #start-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.7rem, 1.8vw, 1rem);
      font-weight: 700; letter-spacing: 0.18em; color: #000;
      background: linear-gradient(90deg, #7a5900, var(--gold), #fffde7, var(--gold), #7a5900);
      background-size: 350% 100%; border: none;
      padding: 1.1rem 3rem; cursor: pointer; text-transform: uppercase;
      animation: btnShimmer 3.2s linear infinite;
      box-shadow: 0 0 22px var(--gold), 0 0 50px rgba(255,215,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #start-btn:hover { transform: scale(1.06); box-shadow: 0 0 40px var(--gold), 0 0 90px rgba(255,215,0,0.55); }
    #start-btn:active { transform: scale(0.97); }

    @keyframes btnShimmer {
      0%   { background-position: 350% 0; }
      100% { background-position: 0%   0; }
    }

    /* ── Stage ────────────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      padding: 3rem;
    }
    @media (max-width: 500px) {
      #stage { padding: 1.2rem; }
    }

    #phrase {
      font-weight: 700; color: var(--gold);
      text-align: center; max-width: 900px;
      line-height: 1.22; opacity: 0;
      text-shadow:
        0 0 18px var(--gold), 0 0 40px var(--gold-mid),
        3px 3px 0 #000,
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9);
      will-change: opacity, transform, filter;
    }

    /* ── Size variants ────────────────────────────────────── */
    .sz-sm { font-size: clamp(1.9rem, 3.8vw, 3rem);  letter-spacing: 0.22em; }
    .sz-md { font-size: clamp(1.8rem, 4.2vw, 3.8rem); letter-spacing: 0.04em; }
    .sz-lg { font-size: clamp(1.8rem, 6vw,   5.2rem); letter-spacing: 0.06em; }
    .sz-xl { font-size: clamp(2.2rem, 8.5vw, 7rem);   letter-spacing: 0.1em;  }

    /* ── Whole-phrase entrance animations ─────────────────── */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(55px) scale(0.94); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0);   }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(1.55); filter: blur(12px); }
      to   { opacity: 1; transform: scale(1);    filter: blur(0);    }
    }
    @keyframes descend {
      from { opacity: 0; transform: translateY(-60px) scale(0.94); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0)      scale(1);    filter: blur(0);   }
    }
    @keyframes driftIn {
      from { opacity: 0; transform: translateX(-60px); filter: blur(6px); }
      to   { opacity: 1; transform: translateX(0);     filter: blur(0);   }
    }
    @keyframes surge {
      0%   { opacity: 0; transform: scale(0.2);  filter: blur(14px); }
      60%  { opacity: 1; transform: scale(1.12); filter: blur(0);    }
      80%  { transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    .anim-rise    { animation: riseUp  0.9s  cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .anim-zoom    { animation: zoomIn  0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .anim-descend { animation: descend 0.9s  cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .anim-drift   { animation: driftIn 0.95s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .anim-surge   { animation: surge   0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ── Per-letter entrance animations ──────────────────── */

    /* Gentle rise — for name calls */
    @keyframes lRise {
      from { opacity: 0; transform: translateY(30px) scale(0.82); filter: blur(7px); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0);   }
    }
    /* Heavy slam from above — for punch lines */
    @keyframes lSlam {
      0%   { opacity: 0; transform: translateY(-65px) scale(1.5);  filter: blur(9px); }
      62%  { opacity: 1; transform: translateY(7px)   scale(0.93); filter: blur(0);   }
      80%  { transform: translateY(-3px) scale(1.03); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .l-rise {
      display: inline-block;
      opacity: 0;
      animation: lRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .l-slam {
      display: inline-block;
      opacity: 0;
      animation: lSlam 0.42s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Climax ───────────────────────────────────────────── */
    #phrase.climax {
      font-size: clamp(3.2rem, 11vw, 9.5rem);
      letter-spacing: 0.07em;
    }
    /* surge enters, then climaxPulse loops */
    .anim-surge.climax {
      animation:
        surge       0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards,
        climaxPulse 0.6s  0.7s ease-in-out infinite alternate;
    }
    @keyframes climaxPulse {
      from {
        color: var(--gold);
        text-shadow: 0 0 25px var(--gold), 0 0 60px var(--gold-mid), 0 0 110px rgba(255,165,0,0.4), 3px 3px 0 #000;
      }
      to {
        color: #fff;
        text-shadow: 0 0 35px #fff, 0 0 70px var(--gold), 0 0 130px var(--gold-mid), 0 0 220px rgba(255,165,0,0.5), 3px 3px 0 #000;
      }
    }

    /* ── Exit ─────────────────────────────────────────────── */
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://videos.pexels.com/video-files/856974/856974-hd_1920_1080_25fps.mp4" type="video/mp4">
  </video>
  <div class="vignette"></div>
  <canvas id="canvas"></canvas>
  <div id="flash"></div>

  <div id="entry">
    <h1 id="entry-title">YOU ARE MIGHTY</h1>
    <button id="start-btn">✦ &nbsp;Turn on the audio and click to see what's in for you..&nbsp; ✦</button>
  </div>

  <div id="stage"><p id="phrase"></p></div>

  <audio id="audio" loop preload="none">
    <source src="/music test 1.mp3" type="audio/mpeg">
  </audio>

  <script>
  (() => {
    /* ── Name from URL ───────────────────────────────────────── */
    const seg = window.location.pathname.split('/').filter(Boolean)[0] || '';
    const name = seg
      ? seg.charAt(0).toUpperCase() + seg.slice(1).toLowerCase()
      : 'You';

    /* ── Dynamic meta ────────────────────────────────────────── */
    document.getElementById('entry-title').textContent = name.toUpperCase();
    document.title = `${name} — You Are Mighty`;
    const desc = `${name}, you are mighty. The world bows to your spirit.`;
    document.querySelector('meta[name="description"]').content = desc;
    document.querySelector('meta[property="og:title"]').content   = `${name} — You Are Mighty`;
    document.querySelector('meta[property="og:description"]').content = desc;
    document.querySelector('meta[name="twitter:title"]').content  = `${name} — You Are Mighty`;
    document.querySelector('meta[name="twitter:description"]').content = desc;

    /* ── Letter builder ──────────────────────────────────────── */
    // Splits text into individually-animated <span>s with staggered delay.
    function buildLetters(text, cls, staggerMs) {
      // Wrap each word in a nowrap inline-block so lines break between words,
      // never mid-word — critical on mobile where font-size is large.
      let i = 0;
      return text.split(' ').map(word => {
        const letters = [...word].map(ch => {
          const delay = (i++ * staggerMs / 1000).toFixed(3);
          return `<span class="${cls}" style="animation-delay:${delay}s">${ch}</span>`;
        }).join('');
        i++; // keep stagger timing in sync with the space character
        return `<span style="display:inline-block;white-space:nowrap">${letters}</span>`;
      }).join(' ');
    }

    /* ── Sequence ────────────────────────────────────────────── */
    // anim   → whole-phrase entrance class (when no letter effect)
    // effect → 'rise' | 'slam' — per-letter entrance
    // size   → 'sm' | 'md' | 'lg' | 'xl'
    // p      → ms the slide stays visible (measured from when entrance begins)
    // punch  → brief screen flash on entry
    // climax → gold particle burst + pulsing glow
    const SEQ = [
      { t: `${name}...`,                               p: 2600, size:'sm', effect:'rise'                    },
      { t: `Today, the world may seem small.`,         p: 2800, size:'md', anim:'rise'                      },
      { t: `Its challenges, immense.`,                 p: 2800, size:'md', anim:'rise'                      },
      { t: `But you are not defined by obstacles.`,    p: 3200, size:'md', anim:'drift'                     },
      { t: `You are defined by your spirit.`,          p: 3200, size:'md', anim:'drift'                     },
      { t: `${name}...`,                               p: 2600, size:'sm', effect:'rise'                    },
      { t: `The mountains you face?`,                  p: 2600, size:'md', anim:'descend'                   },
      { t: `THEY ARE DUST!`,                           p: 3000, size:'lg', effect:'slam', punch:true        },
      { t: `The oceans you must cross?`,               p: 2600, size:'md', anim:'descend'                   },
      { t: `A MERE PUDDLE!`,                           p: 3000, size:'lg', effect:'slam', punch:true        },
      { t: `Because you have the power...`,            p: 3200, size:'md', anim:'rise'                      },
      { t: `...to reshape destiny.`,                   p: 3200, size:'md', anim:'rise'                      },
      { t: `${name}...`,                               p: 2600, size:'sm', effect:'rise'                    },
      { t: `The shadows retreat from your light.`,     p: 3400, size:'md', anim:'drift'                     },
      { t: `The very stars align for your purpose.`,   p: 3400, size:'md', anim:'drift'                     },
      { t: `So rise...`,                               p: 2600, size:'md', anim:'rise'                      },
      { t: `Rise above it all.`,                       p: 3200, size:'md', anim:'rise'                      },
      { t: `Do not just survive.`,                     p: 3200, size:'md', anim:'descend'                   },
      { t: `CONQUER!`,                                 p: 2800, size:'xl', effect:'slam', punch:true        },
      { t: `Because ${name}...`,                       p: 2400, size:'sm', anim:'zoom'                      },
      { t: `${name}...`,                               p: 2000, size:'sm', effect:'rise'                    },
      { t: `YOU ARE MIGHTY!`,                          p: 5500, size:null, anim:'surge', climax:true        },
      { t: ``,                                         p: 4000 }, // silent — stays on black, then stops
    ];

    /* ── DOM ─────────────────────────────────────────────────── */
    const phraseEl = document.getElementById('phrase');
    const flashEl  = document.getElementById('flash');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const audio    = document.getElementById('audio');
    const entryEl  = document.getElementById('entry');

    /* ── Canvas ──────────────────────────────────────────────── */
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    /* ── Particles ───────────────────────────────────────────── */
    let sparks = [], spawnTimer = null;

    function addSpark() {
      sparks.push({
        x: Math.random() * canvas.width, y: canvas.height + 4,
        vx: (Math.random() - 0.5) * 2.4, vy: -(Math.random() * 3.5 + 1.5),
        r: Math.random() * 3.2 + 0.8, a: 1,
        gold: Math.random() > 0.4,
      });
    }

    (function drawLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sparks = sparks.filter(s => s.a > 0.015);
      for (const s of sparks) {
        ctx.save();
        ctx.globalAlpha = s.a;
        ctx.shadowColor = s.gold ? '#FFD700' : '#FFA500';
        ctx.shadowBlur  = 10;
        ctx.fillStyle   = s.gold ? '#FFD700' : '#FFA500';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        s.x += s.vx; s.y += s.vy; s.a -= 0.011;
      }
      requestAnimationFrame(drawLoop);
    })();

    function startSparks() { spawnTimer = setInterval(addSpark, 28); }
    function stopSparks()  { clearInterval(spawnTimer); spawnTimer = null; }

    /* ── Flash ───────────────────────────────────────────────── */
    function flash(intensity) {
      flashEl.style.transition = 'none';
      flashEl.style.opacity = intensity;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        flashEl.style.transition = 'opacity 0.7s ease';
        flashEl.style.opacity = 0;
      }));
    }

    /* ── Sequencer ───────────────────────────────────────────── */
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const raf   = ()  => new Promise(r => requestAnimationFrame(r));

    async function show(slide) {
      /* EXIT — CSS animations beat inline styles in cascade, so this
         fadeOut always wins over whatever opacity state is current.   */
      phraseEl.style.animation = 'fadeOut 0.45s ease forwards';
      await sleep(480);

      /* RESET */
      phraseEl.style.animation = '';
      phraseEl.style.opacity   = '';   // remove any inline opacity
      phraseEl.className       = '';
      phraseEl.innerHTML       = '';

      if (!slide.t) { await sleep(slide.p); return; }

      /* SIZE & STATE CLASSES (before animation so layout is correct) */
      if (slide.size)   phraseEl.classList.add(`sz-${slide.size}`);
      if (slide.climax) phraseEl.classList.add('climax');

      if (slide.effect) {
        /* ── Per-letter entrance ── */
        // Container must be visible so individual letter opacities work
        phraseEl.style.opacity = '1';
        const stagger = slide.effect === 'slam' ? 48 : 65;
        phraseEl.innerHTML = buildLetters(slide.t, `l-${slide.effect}`, stagger);
      } else {
        /* ── Whole-phrase entrance ── */
        phraseEl.textContent = slide.t;
        await raf(); // one frame so browser commits content before animation
        phraseEl.classList.add(`anim-${slide.anim}`);
      }

      if (slide.climax)     { startSparks(); flash(0.22); }
      else if (slide.punch) { flash(0.14); }

      await sleep(slide.p);
      if (slide.climax) stopSparks();
    }

    /* ── Single run — no loop, stops on black screen ─────────── */
    async function run() {
      for (const slide of SEQ) await show(slide);
      // Sequence complete — screen stays dark, video keeps playing
    }

    /* ── Start button ────────────────────────────────────────── */
    document.getElementById('start-btn').addEventListener('click', () => {
      entryEl.style.opacity = '0';
      setTimeout(() => { entryEl.style.display = 'none'; }, 700);

      audio.volume = 0;
      audio.play().then(() => {
        let v = 0;
        const t = setInterval(() => {
          v = Math.min(v + 0.018, 0.72);
          audio.volume = v;
          if (v >= 0.72) clearInterval(t);
        }, 55);
      }).catch(() => {
        console.info('[YouAreMighty] Audio unavailable.');
      });

      run();
    });
  })();
  </script>
</body>
</html>
